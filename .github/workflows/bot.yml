name: MTGPings Bot
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore state file
        id: state-cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: bot-state-${{ github.sha }}-${{ github.run_id }}
          restore-keys: |
            bot-state-
      - name: Run bot
        env:
          WHOP_WEBHOOK_MTG_PREMIUM: ${{ secrets.WHOP_WEBHOOK_MTG_PREMIUM }}
          WHOP_WEBHOOK_MTG_FREE: ${{ secrets.WHOP_WEBHOOK_MTG_FREE }}
          ALERTS_FOR_CREW_DISCORD: ${{ secrets.ALERTS_FOR_CREW_DISCORD }}
          ALERTS_FOR_VAULT_DISCORD: ${{ secrets.ALERTS_FOR_VAULT_DISCORD }}
        run: python bot.py
      - name: Save state file
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: bot-state-${{ github.sha }}-${{ github.run_id }}
